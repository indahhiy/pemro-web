<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Biodata Diri</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ffd6e0, #e0c3fc);
      margin: 0;
      padding: 0;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      max-width: 800px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .foto {
      text-align: center;
    }

    .foto img {
      width: 150px;
      border-radius: 50%;
      border: 5px solid #ffb6c1;
    }

    .judul {
      grid-column: span 2;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #ff69b4;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    td:first-child {
      font-weight: bold;
      color: #ff69b4;
      width: 120px;
    }

    tr:hover {
      background-color: #fff0f5;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="judul">🌸 Biodata Diri 🌸</div>

    <div class="foto">
      <img src="gambarica.jpeg" alt="foto">
      <p>✨ Gambar Saya ✨</p>
    </div>

    <div>
      <table>
        <tr>
          <td>Nama</td>
          <td>Alisia Cello Revalina</td>
        </tr>
        <tr>
          <td>NIM</td>
          <td>241057027</td>
        </tr>
        <tr>
          <td>Jurusan</td>
          <td>Informatika</td>
        </tr>
        <tr>
          <td>Alamat</td>
          <td>Sragen, Jawa Tengah</td>
        </tr>
        <tr>
          <td>Hobi</td>
          <td>Memancing </td>
        </tr>
        <tr>
          <td>Email</td>
          <td>celloalisia@gmail.com</td>
        </tr>
      </table>
    </div>

  </div>

</body>
</html>
