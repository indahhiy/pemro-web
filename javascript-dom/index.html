<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript DOM</title>

    <style>
        body{
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #hasil{
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Form Sapaan</h2>

        <input type="text" id="nama" placeholder="Masukkan nama">

        <button onclick="sapaPengguna()">
            Kirim
        </button>

        <p id="hasil"></p>
    </div>

    <script>
        function sapaPengguna(){

            let nama = document.getElementById("nama").value;

            let hasil = document.getElementById("hasil");

            hasil.innerHTML = "Halo " + nama + ", selamat datang!";
        }
    </script>

</body>
</html>
