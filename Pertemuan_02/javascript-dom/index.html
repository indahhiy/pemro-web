<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 | Form Sapaan dengan JS DOM (Marcello Gian/241054013)
    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1> Hola Min </h1>
        <div class="subtitle">Tugas 2 - PW (JavaScript DOM)</div>

        <div class="form-group">
            <label for="nama">Sialahkan masukkan nama anda:</label>
            <input type="text" id="nama" placeholder="Contoh: Wiradi, Gian, Megadeth. Intinya nama anda! PAHAM KAN?" autocomplete="off">
        </div>

        <button id="sapaBtn">Sapa Saya </button>

        <div class="greeting-area" id="greetingArea">
            <div class="greeting-text">Upsss Belum ada sapaan. Masukkan nama dan klik tombol!</div>
        </div>

        <footer> Tugas ini adalah tugas 2 Pemrograman web yangdibuat dengan CSS & JavaScript DOM</footer>
    </div>
    <!-- Hubungkan file JS eksternal, diletakkan sebelum </body> -->
    <script src="script.js"></script>
</body>
