<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Biodata</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2ff, #fce7f3);
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #f1f1f1;
        }

        .title {
            font-weight: bold;
            color: #2e2be2;
        }

        .biodata-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .badge-custom {
            background: #2e2be2;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4">
                <div class="row align-items-center">

                    <div class="col-md-4 text-center">
                        <img src="Asset/1327041.jpeg" class="profile-img mb-3">
                        <h5 class="title">Bagus Setyoko</h5>
                        <span class="badge badge-custom">Mahasiswa</span>
                    </div>

                    <div class="col-md-8">
                        <h3 class="title mb-4">
                            <i class="bi bi-person-circle"></i> Biodata Diri
                        </h3>

                        <div class="biodata-item">
                            <i class="bi bi-person"></i> <b>Nama:</b> Bagus Setyoko
                        </div>

                        <div class="biodata-item">
                            <i class="bi bi-card-text"></i> <b>NIM:</b> 241054006
                        </div>

                        <div class="biodata-item">
                            <i class="bi bi-calendar"></i> 
                            <b>TTL:</b> Indonesia, 16 Desember 1998
                        </div>

                        <div class="biodata-item">
                            <i class="bi bi-geo-alt"></i> 
                            <b>Alamat:</b> Jl. jauh bgt ga sampe sampe
                        </div>

                        <div class="biodata-item">
                            <i class="bi bi-mortarboard"></i> 
                            <b>Semester:</b> 7
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
